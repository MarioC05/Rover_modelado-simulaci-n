# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager
use_sim_time: true

moveit_simple_controller_manager:
  controller_names:
    - scara_controller
    - gripper_controller

  scara_controller:
    type: FollowJointTrajectory
    joints:
      - Scara1_link_joint
      - Scara2_link_joint
      - Scara3_link_joint
      - Scara4_link_joint
    action_ns: follow_joint_trajectory
    default: true
    use_sim_time: true
  gripper_controller:
    type: FollowJointTrajectory
    joints:
      - Claw1_link_joint
      - Claw2_link_joint
    action_ns: follow_joint_trajectory
    default: true
    use_sim_time: true